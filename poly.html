<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🌍 Polyglot Speak Translator</title>
<link rel="icon" href="https://img.icons8.com/color/512/language.png">

<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1419.0.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#00c6ff,#0072ff,#8e44ad);
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

/* Main Card */

.container{
width:95%;
max-width:1350px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
border-radius:30px;
padding:45px;
box-shadow:0 15px 45px rgba(0,0,0,.25);
}

/* Header */

.hero{
text-align:center;
margin-bottom:40px;
}

.hero h1{
font-size:55px;
color:white;
font-weight:800;
letter-spacing:2px;
text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

.hero p{
margin-top:15px;
font-size:20px;
color:#f3f3f3;
}

/* Language Selection */

.lang-box{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-bottom:35px;
}

.select-card{
background:white;
padding:20px 30px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

label{
display:block;
font-weight:700;
margin-bottom:10px;
color:#333;
}

select{
padding:14px 20px;
border:none;
border-radius:12px;
background:#eef4ff;
font-size:17px;
font-weight:600;
}

/* Translation Panels */

.panels{
display:grid;
grid-template-columns:1fr 1fr;
gap:35px;
}

.box{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
}

.box h2{
margin-bottom:15px;
color:#0072ff;
}

textarea{
width:100%;
height:280px;
border:none;
background:#f7f9ff;
padding:20px;
font-size:18px;
border-radius:18px;
resize:none;
outline:none;
}

/* Buttons */

.button-area{
margin-top:25px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

button{
border:none;
padding:16px 28px;
border-radius:50px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-4px);
}

.translate-btn{
background:linear-gradient(45deg,#0072ff,#00c6ff);
color:white;
}

.voice-btn{
background:linear-gradient(45deg,#7d5fff,#5f27cd);
color:white;
}

.clear-btn{
background:linear-gradient(45deg,#ff6b6b,#ee5253);
color:white;
}

/* Mic icons */

.mic-row{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.mic{
height:60px;
width:60px;
border-radius:50%;
background:linear-gradient(45deg,#00c6ff,#0072ff);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:24px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.2);
transition:.3s;
}

.mic:hover{
transform:scale(1.1);
}

/* Footer */

.footer{
text-align:center;
margin-top:35px;
color:white;
font-size:18px;
font-weight:600;
}

@media(max-width:950px){
.panels{
grid-template-columns:1fr;
}
.hero h1{
font-size:38px;
}
}

</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>🌍 Polyglot Speak</h1>
<p>Multilingual Voice & Text Translation using AWS Translate and Polly</p>
</div>

<div class="lang-box">

<div class="select-card">
<label>Source Language</label>
<select id="sourceLanguageCodeDropdown">
<option value="en">English</option>
<option value="de">German</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="pt">Portuguese</option>
<option value="ko-KR">Korean</option>
<option value="te-IN">Telugu</option>
<option value="ta-IN">Tamil</option>
<option value="hi-IN">Hindi</option>
<option value="nl-BE">Dutch</option>
</select>
</div>

<div class="select-card">
<label>Target Language</label>
<select id="targetLanguageCodeDropdown">
<option value="en">English</option>
<option value="de">German</option>
<option value="es">Spanish</option>
<option value="fr">French</option>
<option value="pt">Portuguese</option>
<option value="ko-KR">Korean</option>
<option value="te-IN">Telugu</option>
<option value="ta-IN">Tamil</option>
<option value="hi-IN">Hindi</option>
<option value="nl-BE">Dutch</option>
</select>
</div>

</div>


<div class="panels">

<div class="box">
<h2><i class="fa-solid fa-language"></i> Input Text</h2>

<textarea id="inputText"
placeholder="Speak or type text here..."></textarea>

<div class="mic-row">
<div class="mic" onclick="startVoiceInput()">
<i class="fa-solid fa-microphone"></i>
</div>

<div class="mic" onclick="doSynthesizeInput()">
<i class="fa-solid fa-volume-high"></i>
</div>
</div>

</div>


<div class="box">
<h2><i class="fa-solid fa-globe"></i> Translated Output</h2>

<textarea id="outputText"
placeholder="Translation appears here..."></textarea>

<div class="mic-row">
<div class="mic" onclick="doSynthesizeOutput()">
<i class="fa-solid fa-volume-high"></i>
</div>
</div>

</div>

</div>


<div class="button-area">
<button class="translate-btn" onclick="doTranslate()">
<i class="fa-solid fa-wand-magic-sparkles"></i>
 Translate
</button>

<button class="voice-btn" onclick="doSynthesizeInput()">
<i class="fa-solid fa-microphone-lines"></i>
 Speak Input
</button>

<button class="voice-btn" onclick="doSynthesizeOutput()">
<i class="fa-solid fa-headphones"></i>
 Speak Output
</button>

<button class="clear-btn" onclick="clearInputs()">
<i class="fa-solid fa-trash"></i>
 Clear
</button>
</div>

<div class="footer">
🚀 Powered by AWS Translate + Polly
</div>

</div>


<script>

document.getElementById("inputText").focus();

AWS.config.region='us-east-1';

AWS.config.credentials=
new AWS.Credentials(
"YOUR_ACCESS_KEY",
"YOUR_SECRET_KEY"
);

var translate=new AWS.Translate();
var polly=new AWS.Polly();

function doTranslate(){

var inputText=document.getElementById(
'inputText').value;

if(!inputText){
alert("Enter text first");
return;
}

var source=
document.getElementById(
"sourceLanguageCodeDropdown").value;

var target=
document.getElementById(
"targetLanguageCodeDropdown").value;

var params={
Text:inputText,
SourceLanguageCode:source,
TargetLanguageCode:target
};

translate.translateText(
params,
function(err,data){

if(err){
alert(err.message);
return;
}

document.getElementById(
'outputText').value=
data.TranslatedText;

});

}


function doSynthesizeInput(){
let text=
document.getElementById(
'inputText').value.trim();

if(text)
doSynthesize(
text,
document.getElementById(
"sourceLanguageCodeDropdown").value
);
}

function doSynthesizeOutput(){

let text=
document.getElementById(
'outputText').value.trim();

if(text)
doSynthesize(
text,
document.getElementById(
"targetLanguageCodeDropdown").value
);

}

function doSynthesize(text,lang){

var voiceId;

switch(lang){

case "de":
voiceId="Marlene";
break;

case "en":
voiceId="Joanna";
break;

case "es":
voiceId="Penelope";
break;

case "fr":
voiceId="Celine";
break;

case "pt":
voiceId="Vitoria";
break;

case "ko-KR":
voiceId="Seoyeon";
break;

case "hi-IN":
voiceId="Aditi";
break;

case "nl-BE":
voiceId="Lotte";
break;

default:
alert("Voice unavailable");
return;
}

var params={
OutputFormat:"mp3",
Text:text,
VoiceId:voiceId
};

polly.synthesizeSpeech(
params,
function(err,data){

if(err){
alert(err.message);
return;
}

let blob=
new Blob(
[new Uint8Array(
data.AudioStream
)]
);

let url=
URL.createObjectURL(blob);

new Audio(url).play();

});

}


function clearInputs(){
inputText.value="";
outputText.value="";
}


/* Browser Speech Recognition */

function startVoiceInput(){

if(
'webkitSpeechRecognition'
in window
){

let recognition=
new webkitSpeechRecognition();

recognition.lang="en-US";

recognition.start();

recognition.onresult=
function(event){

document.getElementById(
'inputText'
).value=
event.results[0][0].transcript;

};

}
else{
alert(
"Speech recognition not supported"
);
}

}

</script>

</body>
</html>
